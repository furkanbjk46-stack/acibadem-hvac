<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acıbadem Synergy Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif; background: #000;
        }

        /* --- SYNERGY: BÜTÜNCÜL VE LÜKS ANA BAŞLIK --- */
        .main-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 1.2vw;
            letter-spacing: 5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Alt Başlık Vurgusu (İnce ve Zarif) */
        .main-title .subtitle {
            font-weight: 300;
            font-size: 1vw;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        /* Panellere gelindiğinde başlığın esnemesi ve renk alması */
        body:has(.hvac-panel:hover) .main-title {
            left: 54.54%;
            color: #e0f2fe;
            text-shadow: 0 4px 25px rgba(2, 132, 199, 0.8);
            letter-spacing: 7px;
        }

        body:has(.energy-panel:hover) .main-title {
            left: 45.45%;
            color: #d1fae5;
            text-shadow: 0 4px 25px rgba(5, 150, 105, 0.8);
            letter-spacing: 7px;
        }

        .split-container { display: flex; width: 100vw; height: 100vh; }

        .panel {
            flex: 1; position: relative; text-decoration: none; overflow: hidden;
            background-size: cover; background-position: center; transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hvac-panel { background-image: url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=1000'); }
        .energy-panel { background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1000'); }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(15, 23, 42, 0.8); transition: background 0.6s;
        }

        .panel:hover { flex: 1.2; }
        .hvac-panel:hover .overlay { background: rgba(2, 132, 199, 0.4); }
        .energy-panel:hover .overlay { background: rgba(5, 150, 105, 0.4); }

        /* Alt Başlıklar ve Font Ayarları (Synergy Revizyonu) */
        .content { text-align: center; color: #fff; transform: translateY(20px); transition: transform 0.6s; }
        .panel:hover .content { transform: translateY(0); }

        .content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5vw;
            font-weight: 400; /* Daha zarif bir görünüm için inceltildi */
            margin: 0;
            letter-spacing: 2px;
        }
        .content p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1vw;
            font-weight: 300;
            letter-spacing: 3px; /* Premium his için harf arası açıldı */
            color: #cbd5e1;
            margin-top: 15px;
            text-transform: uppercase; /* Alt metinler modernize edildi */
        }

        /* Çizgi tasarımı ve hover esnasında yumuşak parlama efekti */
        .divider {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
            background: rgba(255,255,255,0.15); z-index: 10; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body:has(.hvac-panel:hover) .divider {
            left: 54.54%;
            background: rgba(2, 132, 199, 0.5);
            box-shadow: 0 0 10px rgba(2,132,199,0.5);
        }
        body:has(.energy-panel:hover) .divider {
            left: 45.45%;
            background: rgba(5, 150, 105, 0.5);
            box-shadow: 0 0 10px rgba(5,150,105,0.5);
        }
    </style>
</head>
<body>

    <!-- YENİ SYNERGY BAŞLIK -->
    <div class="main-title">
        SYNERGY <span class="subtitle"> ACIBADEM | Akıllı Tesis Ekosistemi</span>
    </div>

    <div class="divider"></div>
    <div class="split-container">
        <a href="/hvac" class="panel hvac-panel">
            <div class="overlay">
                <div class="content">
                    <h1>Mekanik Zeka</h1>
                    <p>Algoritmik Akış Kontrolü</p>
                </div>
            </div>
        </a>
        <a href="/enerji" class="panel energy-panel">
            <div class="overlay">
                <div class="content">
                    <h1>Enerji ve Verimlilik</h1>
                    <p>Merkezi Performans İzleme</p>
                </div>
            </div>
        </a>
    </div>
</body>
</html>
